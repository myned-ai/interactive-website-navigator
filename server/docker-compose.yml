# ==============================================================================
# Web Navigator Server - Docker Compose Configuration
# ==============================================================================
#
# Usage:
#   Production:  docker-compose up -d
#   Development: docker-compose --profile dev up
#   Logs:        docker-compose logs -f
#   Stop:        docker-compose down
#
# ==============================================================================

services:
  # ============================================================================
  # Web Navigator Server (Production)
  # ============================================================================
  server:
    build:
      context: .
      target: production
    container_name: interactive-website-navigator
    ports:
      - "${SERVER_PORT:-8080}:8080"
    environment:
      - ASSISTANT_INSTRUCTIONS=${ASSISTANT_INSTRUCTIONS:-You are a helpful and friendly AI assistant.}
      - ONNX_MODEL_PATH=/app/pretrained_models/wav2arkit_cpu.onnx
      - SERVER_HOST=0.0.0.0
      - SERVER_PORT=8080
      - AUTH_ENABLED=false
      - DEBUG=${DEBUG:-false}
      - DEBUG_AUDIO_CAPTURE=${DEBUG_AUDIO_CAPTURE:-false}
      # Agent Configuration
      - AGENT_TYPE=${AGENT_TYPE:-sample_gemini}
      # Gemini Configuration (local dev uses API key, not Vertex AI)
      - GEMINI_USE_VERTEX=${GEMINI_USE_VERTEX:-false}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GEMINI_VERTEX_PROJECT=${GEMINI_VERTEX_PROJECT}
      - GEMINI_VERTEX_LOCATION=${GEMINI_VERTEX_LOCATION:-us-central1}
      - GEMINI_VERTEX_MODEL=${GEMINI_VERTEX_MODEL}
      - GEMINI_MODEL=${GEMINI_MODEL}
      - GEMINI_VOICE=${GEMINI_VOICE}
      - GEMINI_THINKING_BUDGET=${GEMINI_THINKING_BUDGET}
      - GEMINI_GOOGLE_SEARCH_GROUNDING=${GEMINI_GOOGLE_SEARCH_GROUNDING}
      - GEMINI_PROACTIVE_AUDIO=${GEMINI_PROACTIVE_AUDIO}
      - GEMINI_CONTEXT_WINDOW_COMPRESSION=${GEMINI_CONTEXT_WINDOW_COMPRESSION}
      - KNOWLEDGE_BASE_SOURCE=${KNOWLEDGE_BASE_SOURCE:-none}
    volumes:
      # Mount Knowledge Base
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ============================================================================
  # Web Navigator Server (Development with hot reload)
  # ============================================================================
  server-dev:
    build:
      context: .
      target: development
    container_name: interactive-website-navigator-dev
    profiles:
      - dev
    ports:
      - "${SERVER_PORT:-8080}:8080"
    environment:
      - ASSISTANT_INSTRUCTIONS=${ASSISTANT_INSTRUCTIONS:-You are a helpful and friendly AI assistant.}
      - ONNX_MODEL_PATH=/app/pretrained_models/wav2arkit_cpu.onnx
      - SERVER_HOST=0.0.0.0
      - SERVER_PORT=8080
      - AUTH_ENABLED=false
      - DEBUG=true
      # Agent Configuration
      - AGENT_TYPE=${AGENT_TYPE:-sample_gemini}
      # Gemini Configuration (local dev uses API key, not Vertex AI)
      - GEMINI_USE_VERTEX=${GEMINI_USE_VERTEX:-false}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GEMINI_VERTEX_PROJECT=${GEMINI_VERTEX_PROJECT}
      - GEMINI_VERTEX_LOCATION=${GEMINI_VERTEX_LOCATION:-us-central1}
      - GEMINI_VERTEX_MODEL=${GEMINI_VERTEX_MODEL}
      - GEMINI_MODEL=${GEMINI_MODEL}
      - GEMINI_VOICE=${GEMINI_VOICE}
      - GEMINI_THINKING_BUDGET=${GEMINI_THINKING_BUDGET}
      - GEMINI_GOOGLE_SEARCH_GROUNDING=${GEMINI_GOOGLE_SEARCH_GROUNDING}
      - GEMINI_PROACTIVE_AUDIO=${GEMINI_PROACTIVE_AUDIO}
      - GEMINI_CONTEXT_WINDOW_COMPRESSION=${GEMINI_CONTEXT_WINDOW_COMPRESSION}
      - KNOWLEDGE_BASE_SOURCE=${KNOWLEDGE_BASE_SOURCE:-none}
    volumes:
      # Mount source code for hot reload
      - .:/app
